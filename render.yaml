services:
  - type: web
    name: privachat-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: privachat-db
          property: connectionString

databases:
  - name: privachat-db
    plan: free
    databaseName: privachat
